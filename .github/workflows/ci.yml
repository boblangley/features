name: CI - Test Features

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-autogenerated:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature:
          - codex-cli
          - claude-code-cli
          - gemini-cli
          - t3code-server
        baseImage:
          - debian:bookworm
          - mcr.microsoft.com/devcontainers/base:noble
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test autogenerated scenario
        run: devcontainer features test --skip-scenarios -f ${{ matrix.feature }} -i ${{ matrix.baseImage }} .

  test-scenarios:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        feature:
          - t3code-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install latest devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test declared scenarios
        run: devcontainer features test -f ${{ matrix.feature }} --skip-autogenerated --skip-duplicated .
